<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flusso Onboarding - Passi 1~3</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: #111;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 12px;
    }
    .shell {
      width: min(390px, calc(100vw - 24px));
      height: min(844px, calc(100dvh - 24px));
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      background: #fff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Contenitore passaggi onboarding">
    <iframe
      id="flowFrame"
      title="Flusso Onboarding"
      src="./figma-onboarding-1643-364778.html"
      loading="eager"
      referrerpolicy="no-referrer"
    ></iframe>
  </main>

  <script>
    (function () {
      var frame = document.getElementById("flowFrame");
      var STEP_SRC = {
        1: "./figma-onboarding-1643-364778.html",
        2: "./figma-onboarding-1455-32069.html",
        3: "./figma-onboarding-1647-533575.html"
      };

      function setStep(step) {
        var target = STEP_SRC[step];
        if (!target) return;
        frame.src = target;
      }

      window.addEventListener("message", function (event) {
        var data = event && event.data ? event.data : null;
        if (!data || data.type !== "onboarding-flow") return;
        setStep(Number(data.step));
      });
    })();
  </script>
</body>
</html>
